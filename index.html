<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Digital QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body{font-family:Arial,sans-serif;max-width:900px;margin:20px auto;padding:20px;background:#f8f8f8}
    .card{background:white;padding:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.08);margin-bottom:20px}
    button{padding:10px 16px;border:none;background:#222;color:#fff;border-radius:8px;cursor:pointer}
    input{padding:10px;width:100%;margin:8px 0}
  </style>
</head>
<body>
<div class="card">
<h2>Sistem Pemesanan Digital Gratis</h2>
<input id="shop" placeholder="Nama usaha">
<input id="wa" placeholder="Nomor WhatsApp (628xxx)">
<button onclick="generateQR()">Buat Barcode QR</button>
<div id="qrcode"></div>
</div>
<div class="card">
<h3>Menu</h3>
<ul>
<li>Espresso - Rp15.000</li>
<li>Latte - Rp22.000</li>
<li>Cappuccino - Rp20.000</li>
</ul>
<button onclick="order('Latte')">Pesan via WhatsApp</button>
</div>
<script>
function order(menu){
 const wa=document.getElementById('wa').value;
 window.open(`https://wa.me/${wa}?text=Saya%20pesan%20${menu}`,'_blank');
}
function generateQR(){
 document.getElementById('qrcode').innerHTML='';
 const wa=document.getElementById('wa').value;
 new QRCode(document.getElementById('qrcode'),`https://wa.me/${wa}`);
}
</script>
</body>
</html>
