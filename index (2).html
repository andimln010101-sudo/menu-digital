<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2% Coffee Space</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
max-width:900px;
margin:20px auto;
padding:20px;
background:#f8f8f8;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
padding:10px 16px;
border:none;
background:#222;
color:white;
border-radius:8px;
cursor:pointer;
}

input,select{
padding:10px;
width:100%;
margin:8px 0;
}
</style>
</head>

<body>

<div class="card">
<h2>2% Coffee Space</h2>

<input id="shop" value="2% coffee space">

<input id="wa" value="6285816300872">

<input id="nama" placeholder="Nama pelanggan">

<input id="meja" placeholder="Nomor meja">

<select id="payment">
<option value="Cash">Cash</option>
<option value="QRIS">QRIS</option>
</select>

<button onclick="generateQR()">Buat Barcode QR</button>

<div id="qrcode"></div>
</div>

<div class="card">
<h3>Menu</h3>

<button onclick="order('Black Coffee')">Black Coffee</button>
<button onclick="order('Cappuccino')">Cappuccino</button>
<button onclick="order('Cafelatte')">Cafelatte</button>
<button onclick="order('Kopi Susu')">Kopi Susu</button>

</div>

<script>
function order(menu){
const wa=document.getElementById('wa').value;
const nama=document.getElementById('nama').value;
const meja=document.getElementById('meja').value;
const payment=document.getElementById('payment').value;

const pesan=
`Nama: ${nama}
Meja: ${meja}
Menu: ${menu}
Pembayaran: ${payment}`;

window.open(`https://wa.me/${wa}?text=${encodeURIComponent(pesan)}`,'_blank');
}

function generateQR(){
document.getElementById('qrcode').innerHTML='';
const wa=document.getElementById('wa').value;
new QRCode(document.getElementById('qrcode'),`https://wa.me/${wa}`);
}
</script>

</body>
</html>
